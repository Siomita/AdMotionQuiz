<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Assessment — AdMotion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F1;
  --white: #FFFFFF;
  --black: #0D0D0D;
  --muted: #888880;
  --border: rgba(13,13,13,.1);
  --border-hover: rgba(13,13,13,.25);
  --border-selected: rgba(13,13,13,.9);
  --card-selected-bg: rgba(13,13,13,.04);
  --accent: #fb8b24;
  --radius: 12px;
  --radius-sm: 8px;
  --max: 560px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--black);overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;}

/* HEADER */
#quiz-header{width:100%;max-width:var(--max);padding:20px 24px 0;display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0;}
.logo{font-family:var(--font);font-weight:800;font-size:17px;letter-spacing:-.3px;color:var(--black);}

.progress-wrap{width:100%;display:flex;flex-direction:column;gap:6px;}
.progress-track{height:2px;background:rgba(13,13,13,.08);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--black);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:11px;color:var(--muted);letter-spacing:.04em;text-align:center;font-weight:500;}

/* BODY */
#quiz-body{width:100%;max-width:var(--max);flex:1;min-height:0;display:flex;flex-direction:column;padding:20px 24px 24px;animation:fadeUp .35s ease;overflow-y:auto;overflow-x:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* QUESTION TYPOGRAPHY */
.q-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.q-headline{font-family:var(--font);font-weight:700;font-size:clamp(17px,4.5vw,22px);line-height:1.25;letter-spacing:-.3px;margin-bottom:5px;color:var(--black);}
.q-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:0;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:center;gap:14px;padding:16px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.options.compact .opt{padding:13px 16px;}
.opt:hover{border-color:var(--border-hover);background:#fafaf8;}
.opt.selected{border-color:var(--border-selected);background:var(--card-selected-bg);}
.opt-radio{width:18px;height:18px;border:1.5px solid var(--border-hover);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
.opt.selected .opt-radio{border-color:var(--black);}
.opt-dot{width:8px;height:8px;border-radius:50%;background:var(--black);opacity:0;transition:opacity .15s;}
.opt.selected .opt-dot{opacity:1;}
.opt-checkbox{width:18px;height:18px;border:1.5px solid var(--border-hover);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;}
.opt.selected .opt-checkbox{border-color:var(--black);background:var(--black);}
.opt-check-dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s;}
.opt.selected .opt-check-dot{opacity:1;}
.opt-text{flex:1;}
.opt-label{font-size:14px;font-weight:500;line-height:1.35;color:var(--black);}
.opt-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}

/* GRID 2x2 */
.grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-opt{padding:16px 14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s;user-select:none;text-align:left;display:flex;flex-direction:column;}
.grid-opt:hover{border-color:var(--border-hover);background:#fafaf8;}
.grid-opt.selected{border-color:var(--border-selected);background:var(--card-selected-bg);}
.grid-icon{font-size:20px;margin-bottom:10px;display:block;color:var(--black);opacity:.7;}
.grid-label{font-family:var(--font);font-weight:700;font-size:14px;line-height:1.3;color:var(--black);margin-bottom:4px;}
.grid-desc{font-size:12px;color:var(--muted);line-height:1.5;}

/* WHY CARD */
.why-card{margin-top:32px;position:relative;background:#fb8b24;border-radius:16px;padding:20px 18px 18px;text-align:center;}
.why-card-icon{width:72px;height:72px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.why-card-icon img{width:52px;height:36px;object-fit:contain;}
.why-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:.01em;}
.why-text{font-size:13px;color:#fff;line-height:1.65;text-align:center;}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-shrink:0;}
.btn-next{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:100px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;}
.btn-next:disabled{opacity:.25;cursor:default;}
.btn-next:not(:disabled):hover{transform:scale(1.02);}
.btn-back{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);padding:4px 0;transition:color .15s;font-weight:500;}
.btn-back:hover{color:var(--black);}
.btn-back:focus{outline:none;}

.last-one{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;opacity:0;transition:opacity .3s;font-style:italic;}
.last-one.show{opacity:1;}

/* FACT SCREEN */
.fact-screen{text-align:center;padding:16px 0;}
.fact-img-wrap{margin:0 0 24px;}
.fact-img{width:100%;max-height:42vh;object-fit:contain;border-radius:var(--radius);display:block;}
.fact-headline{font-family:var(--font);font-weight:700;font-size:clamp(20px,5vw,26px);line-height:1.2;letter-spacing:-.4px;margin-bottom:10px;color:var(--black);}
.fact-body{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto;}
.btn-continue{background:var(--accent);color:#fff;border:none;padding:13px 32px;border-radius:100px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.02em;transition:transform .15s;}
.btn-continue:hover{transform:scale(1.02);}

/* INTERRUPT */
.interrupt-img-wrap{margin:0 0 20px;}

/* LOADER */
.loader-screen{text-align:center;padding:16px 0;}
.loader-headline{font-family:var(--font);font-weight:700;font-size:clamp(20px,5vw,26px);letter-spacing:-.4px;margin-bottom:10px;line-height:1.2;color:var(--black);}
.loader-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:380px;margin-left:auto;margin-right:auto;text-align:center;}
.loader-items{display:flex;flex-direction:column;gap:14px;text-align:left;max-width:380px;margin:0 auto;}
.loader-item{display:flex;align-items:center;gap:14px;opacity:0;transform:translateX(-6px);transition:opacity .4s,transform .4s;}
.loader-item.show{opacity:1;transform:translateX(0);}
.loader-icon{width:34px;height:34px;border-radius:8px;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s,border-color .3s;color:var(--black);}
.loader-text{font-size:14px;color:var(--muted);transition:color .3s;font-weight:400;}
.loader-item.done .loader-text{color:var(--black);font-weight:500;}
.loader-item.done .loader-icon{border-color:var(--black);}

/* DIAGNOSIS / RESULTS */
.diag-screen{padding:28px 0 56px;display:flex;flex-direction:column;gap:0;}
.diag-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.diag-headline{font-family:var(--font);font-weight:700;font-size:clamp(20px,5vw,26px);letter-spacing:-.4px;line-height:1.2;margin-bottom:6px;color:var(--black);}
.diag-subline{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.diag-video-wrap{width:100%;aspect-ratio:16/9;background:var(--black);border-radius:var(--radius);overflow:hidden;position:relative;margin-bottom:20px;}
.diag-video-wrap iframe{width:100%;height:100%;border:none;display:block;}
.diag-video-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
.diag-play-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s;}
.diag-video-placeholder:hover .diag-play-btn{background:rgba(255,255,255,.25);transform:scale(1.06);}
.diag-play-icon{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #fff;margin-left:4px;}
.diag-video-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.04em;}
.btn-diag{width:100%;padding:15px;border-radius:100px;font-family:var(--font);font-weight:700;font-size:15px;cursor:pointer;border:none;background:var(--accent);color:#fff;letter-spacing:.02em;transition:transform .15s,opacity .2s;margin-bottom:10px;}
.btn-diag:hover{transform:scale(1.01);}
.diag-small{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:28px;}
.diag-social{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.diag-social-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.diag-review{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.diag-stars{font-size:13px;letter-spacing:1px;margin-bottom:6px;color:#b8860b;}
.diag-review-text{font-size:13px;color:var(--black);line-height:1.6;margin-bottom:8px;}
.diag-reviewer{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

/* OPTIN */

/* RESULT */
.result-screen{padding-bottom:48px;}
.result-headline{font-family:var(--font);font-weight:700;font-size:clamp(18px,4.5vw,22px);line-height:1.2;letter-spacing:-.3px;margin-bottom:14px;color:var(--black);}
.result-img-wrap{margin:0 0 20px;border-radius:var(--radius);overflow:hidden;}
.result-img-wrap img{width:100%;display:block;border-radius:var(--radius);}
.result-cta{width:100%;padding:16px;border-radius:100px;font-family:var(--font);font-weight:700;font-size:16px;cursor:pointer;border:none;background:var(--black);color:#fff;letter-spacing:.02em;transition:transform .15s;margin-bottom:12px;display:block;text-align:center;text-decoration:none;}
.result-cta:hover{transform:scale(1.01);}
.result-guarantee{font-size:12px;color:var(--muted);text-align:center;line-height:1.7;}
.offer-secondary{text-align:center;font-size:13px;color:var(--muted);padding:0 4px;margin-top:16px;}
.offer-secondary a{color:var(--black);font-weight:600;cursor:pointer;text-decoration:underline;}

.hook-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px;}

/* GIFT SCREEN */
.gift-screen{display:flex;flex-direction:column;height:100%;}
.gift-timer-bar{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border-radius:var(--radius);padding:10px 16px;margin-bottom:24px;flex-shrink:0;}
.gift-timer-bar.expired{background:#6b6b60;}
.gift-timer-icon{font-size:16px;}
.gift-timer-text{font-size:13px;font-weight:600;letter-spacing:.02em;}
.gift-timer-countdown{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;min-width:38px;text-align:right;}
.gift-heading{font-family:var(--font);font-weight:700;font-size:clamp(19px,5vw,24px);line-height:1.2;letter-spacing:-.3px;color:var(--black);margin-bottom:6px;}
.gift-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.gift-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.gift-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:18px 14px;cursor:pointer;transition:border-color .15s,background .15s,transform .15s;user-select:none;display:flex;flex-direction:column;align-items:flex-start;position:relative;}
.gift-card:hover{border-color:var(--border-hover);background:#fafaf8;transform:translateY(-2px);}
.gift-card.selected{border-color:var(--border-selected);background:var(--card-selected-bg);}
.gift-card-check{position:absolute;top:12px;right:12px;width:18px;height:18px;border:1.5px solid var(--border-hover);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;}
.gift-card.selected .gift-card-check{border-color:var(--accent);background:var(--accent);}
.gift-card-check-dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s;}
.gift-card.selected .gift-card-check-dot{opacity:1;}
.gift-card-emoji{font-size:28px;margin-bottom:10px;display:block;}
.gift-card-title{font-size:14px;font-weight:700;color:var(--black);margin-bottom:5px;line-height:1.3;padding-right:20px;}
.gift-card-desc{font-size:12px;color:var(--muted);line-height:1.55;}
/* Mystery card */
.gift-card.mystery{background:linear-gradient(145deg,#1a1a1a,#2d2d2d);border-color:#1a1a1a;}
.gift-card.mystery:hover{background:linear-gradient(145deg,#222,#333);border-color:#333;transform:translateY(-2px);}
.gift-card.mystery.selected{border-color:#fff;background:linear-gradient(145deg,#222,#333);}
.gift-card.mystery .gift-card-check{border-color:rgba(255,255,255,.3);}
.gift-card.mystery.selected .gift-card-check{border-color:#fff;background:#fff;}
.gift-card.mystery.selected .gift-card-check-dot{background:var(--black);}
.gift-card.mystery .gift-card-title{color:#fff;padding-right:20px;}
.gift-card.mystery .gift-card-desc{color:rgba(255,255,255,.5);}
.mystery-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:4px;padding:3px 7px;margin-bottom:10px;}
.gift-cta-wrap{margin-top:20px;}
.btn-gift{width:100%;padding:15px;border-radius:100px;font-family:var(--font);font-weight:700;font-size:15px;cursor:pointer;border:none;background:var(--accent);color:#fff;letter-spacing:.02em;transition:transform .15s,opacity .2s;}
.btn-gift:disabled{opacity:.25;cursor:default;}
.btn-gift:not(:disabled):hover{transform:scale(1.01);}
</style>
</head>

  <div class="logo">AdMotion</div>
  <div class="progress-wrap">

    <div class="progress-label" id="progress-label">Question 1 of 12</div>
  </div>
</div>

<div id="quiz-body"></div>

const Q_SCREENS = ['hook','q2','q3','q4','q5','q6','q7','q8','q9','q10','q11','q12'];
const TOTAL_Q = 12;

function qNum(screen){ return Q_SCREENS.indexOf(screen)+1; }

function getRoute(){
  if(sopScore > courseScore) return 'sop';
  if(courseScore >= 14) return 'warm';
  return 'mid';
}

function updateProgress(screen){
  const n = qNum(screen);
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  const header = document.getElementById('quiz-header');
  if(screen==='diagnosis'||screen==='gift'){
    header.style.display='none';
  } else if(n>0){
    header.style.display='';
    fill.style.width=((n-1)/TOTAL_Q*100)+'%';
    const m=["Let's get started","Good start — keep going","You're on a roll","Great work so far","Keep going","More than halfway there","You're doing great","Nearly there","Almost done","So close now","One more to go","Last question — finish strong"];
    label.textContent=m[n-1]||'Keep going';
  } else if(screen==='loader'){
    header.style.display='';
    fill.style.width='100%';
    label.textContent='Almost there';
  }
}

function goTo(screen){
  // Clear any running gift timer
  if(window._giftTimer){clearInterval(window._giftTimer);window._giftTimer=null;}
  currentIndex=SCREENS.indexOf(screen);
  updateProgress(screen);
  const body=document.getElementById('quiz-body');
  body.innerHTML='';
  body.style.animation='none';
  void body.offsetWidth;
  body.style.animation='fadeUp .35s ease';
  renderScreen(screen,body);
}

function next(){ const s=SCREENS[currentIndex+1]; if(s) goTo(s); }
function back(){ if(currentIndex>0) goTo(SCREENS[currentIndex-1]); }
function addScore(course,sop){ courseScore+=course; sopScore+=sop; }

function renderScreen(screen,el){
  switch(screen){
    case 'gift': renderGift(el); break;
    case 'hook': renderHook(el); break;
    case 'q2': renderQ2(el); break;
    case 'q3': renderQ3(el); break;
    case 'q4': renderQ4(el); break;
    case 'q5': renderQ5(el); break;
    case 'q6': renderQ6(el); break;
    case 'fact': renderFact(el); break;
    case 'q7': renderQ7(el); break;
    case 'q8': renderQ8(el); break;
    case 'q9': renderQ9(el); break;
    case 'q10': renderQ10(el); break;
    case 'q11': renderQ11(el); break;
    case 'q12': renderQ12(el); break;
    case 'interrupt': renderInterrupt(el); break;
    case 'loader': renderLoader(el); break;
    case 'diagnosis': renderDiagnosis(el); break;
  }
}

function singleSelect(screen,key,opts,headline,sub){
  return function(el){
    let sel=A[key]||null;
    el.innerHTML=`
      <div style="display:flex;flex-direction:column;height:100%;">
      <div class="q-label">Question ${qNum(screen)} of ${TOTAL_Q}</div>
      <div class="q-headline">${headline}</div>
      ${sub?`<div class="q-sub" style="margin-top:4px;">${sub}</div>`:''}
      <div class="options" id="opts" style="margin-top:20px;"></div>
      <div class="nav" style="margin-top:auto;padding-top:12px;">
        <button class="btn-back" onclick="back()">${currentIndex>0?'Back':''}</button>
      </div>
      </div>`;
    const c=el.querySelector('#opts');
    opts.forEach(o=>{
      const d=document.createElement('div');
      d.className='opt'+(sel===o.val?' selected':'');
      d.innerHTML=`<div class="opt-radio"><div class="opt-dot"></div></div><div class="opt-text"><div class="opt-label">${o.label}</div>${o.desc?`<div class="opt-desc">${o.desc}</div>`:''}</div>`;
      d.onclick=()=>{
        sel=o.val; c.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected')); d.classList.add('selected');
        A[key]=sel; if(o.score) addScore(o.score[0],o.score[1]);
        setTimeout(next,330);
      };
      c.appendChild(d);
    });
  };
}

function renderGift(el){
  let sel=A['gift']||null;
  const TOTAL_SECS=600; // 10 minutes
  let secsLeft=window._giftSecsLeft!=null?window._giftSecsLeft:TOTAL_SECS;

  function fmt(s){
    const m=Math.floor(s/60),ss=s%60;
    return m+':'+(ss<10?'0':'')+ss;
  }

  el.innerHTML=`
    <div class="gift-screen">
      <div class="gift-timer-bar" id="gift-timer-bar">
        <span class="gift-timer-icon">🎁</span>
        <span class="gift-timer-text">Free gift reserved for</span>
        <span class="gift-timer-countdown" id="gift-countdown">${fmt(secsLeft)}</span>
      </div>
      <div class="gift-heading">Pick a FREE GIFT with your results.</div>
      <div class="gift-sub">Choose one — we'll unlock it for you at the end.</div>
      <div class="gift-cards">
        <div class="gift-card${sel==='checklist'?' selected':''}" id="gc-checklist" onclick="selectGift('checklist')">
          <div class="gift-card-check"><div class="gift-card-check-dot"></div></div>
          <span class="gift-card-emoji">✅</span>
          <div class="gift-card-title">AI Content Starter Checklist</div>
          <div class="gift-card-desc">Step-by-step checklist for your first AI content piece. No guesswork.</div>
        </div>
        <div class="gift-card mystery${sel==='mystery'?' selected':''}" id="gc-mystery" onclick="selectGift('mystery')">
          <div class="gift-card-check"><div class="gift-card-check-dot"></div></div>
          <span class="gift-card-emoji">🎲</span>
          <div class="mystery-badge">Mystery Gift</div>
          <div class="gift-card-title">??? Surprise Resource</div>
          <div class="gift-card-desc">Only revealed at the end. Could be anything — pick this if you like surprises.</div>
        </div>
      </div>
      <div class="gift-cta-wrap">
        <button class="btn-gift" id="btn-gift" ${sel?'':'disabled'} onclick="next()">Take the 2-minute quiz →</button>
      </div>
    </div>`;

  // Start or continue countdown
  window._giftTimer=setInterval(()=>{
    secsLeft--;
    window._giftSecsLeft=secsLeft;
    const cd=document.getElementById('gift-countdown');
    const bar=document.getElementById('gift-timer-bar');
    if(!cd){clearInterval(window._giftTimer);return;}
    if(secsLeft<=0){
      clearInterval(window._giftTimer);
      bar.classList.add('expired');

      bar.querySelector('.gift-timer-text').textContent='Offer expired — gift still included';
    } else {
      cd.textContent=fmt(secsLeft);
    }
  },1000);

  window.selectGift=function(val){
    sel=val;
    A['gift']=val;

    document.getElementById('gc-'+val).classList.add('selected');
    document.getElementById('btn-gift').disabled=false;
  };
}

    d.innerHTML=`<div class="opt-radio"><div class="opt-dot"></div></div><div class="opt-text"><div class="opt-label">${o.label}</div></div>`;
    d.onclick=()=>{
      sel=o.val; c.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected')); d.classList.add('selected');
      document.getElementById('last-one').classList.add('show');
      A['q12']=sel; const p=opts.find(x=>x.val===sel); if(p) addScore(p.score[0],p.score[1]);
      setTimeout(next,320);
    };
    c.appendChild(d);
  });
}
